name: Release Gliding Code

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BINARY_NAME: glidingcode

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zigbuild: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_zigbuild: true

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protoc (all platforms)
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update && sudo apt-get install -y protobuf-compiler
              ;;
            macOS)
              brew install protobuf
              ;;
            Windows)
              choco install protoc --yes
              ;;
          esac

      - name: Install cargo-zigbuild (musl targets)
        if: matrix.use_zigbuild
        run: pip install cargo-zigbuild

      - name: Set RUSTFLAGS for fully static musl linking
        if: contains(matrix.target, 'musl')
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      - name: Build directly
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      - name: Verify static linking (Linux musl)
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          file "$BIN"
          ldd "$BIN" 2>&1 && echo "⚠️  DYNAMIC: linked to shared libraries" || echo "✅ STATIC: no dynamic dependencies"

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: target/${{ matrix.target }}/release
        run: tar czvf ${{ github.workspace }}/glidingcode-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: target/${{ matrix.target }}/release
        run: Compress-Archive -Path ${{ env.BINARY_NAME }}.exe -DestinationPath ${{ github.workspace }}/glidingcode-${{ matrix.target }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            glidingcode-${{ matrix.target }}.tar.gz
            glidingcode-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
